<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cascade Brain Visualizer</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a0f;
            color: #e5e5e5;
            overflow: hidden;
        }
        #graph {
            width: 100vw;
            height: 100vh;
        }
        .node circle {
            fill: #6366f1;
            stroke: #818cf8;
            stroke-width: 2;
            cursor: pointer;
            transition: all 0.3s;
        }
        .node:hover circle {
            fill: #8b5cf6;
            r: 25;
        }
        .node text {
            fill: #e5e5e5;
            font-size: 12px;
            pointer-events: none;
            text-anchor: middle;
        }
        .link {
            stroke: #334155;
            stroke-width: 1.5;
        }
        .tooltip {
            position: absolute;
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 12px;
            max-width: 300px;
            font-size: 13px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .panel {
            position: fixed;
            right: 0;
            top: 0;
            width: 400px;
            height: 100vh;
            background: rgba(15, 23, 42, 0.98);
            border-left: 1px solid #334155;
            padding: 20px;
            overflow-y: auto;
            transform: translateX(100%);
            transition: transform 0.3s;
        }
        .panel.active { transform: translateX(0); }
        .panel h2 { color: #818cf8; margin-bottom: 16px; font-size: 18px; }
        .panel pre {
            background: #0f172a;
            padding: 12px;
            border-radius: 8px;
            font-size: 12px;
            line-height: 1.6;
            overflow-x: auto;
            white-space: pre-wrap;
        }
        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 24px;
            cursor: pointer;
        }
        .refresh-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: #6366f1;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            z-index: 100;
        }
        .refresh-btn:hover { background: #8b5cf6; }
    </style>
</head>
<body>
    <button class="refresh-btn" onclick="loadData()">Refresh Data</button>
    <div id="graph"></div>
    <div class="tooltip" id="tooltip"></div>
    <div class="panel" id="panel">
        <button class="close-btn" onclick="closePanel()">×</button>
        <h2 id="panel-title">Node Details</h2>
        <pre id="panel-content">Select a node to view details</pre>
    </div>

    <script>
        // Parse markdown files and create graph data
        const files = {
            'README.md': null,
            'conversations.md': null,
            'user-context.md': null,
            'decisions.md': null,
            'tasks-pending.md': null
        };

        // Sample data structure (in real use, this would fetch actual files)
        const graphData = {
            nodes: [
                { id: 'brain', label: 'Cascade Brain', type: 'root', r: 40 },
                { id: 'conversations', label: 'Conversations', type: 'memory' },
                { id: 'user-context', label: 'User Context', type: 'memory' },
                { id: 'decisions', label: 'Decisions', type: 'memory' },
                { id: 'tasks', label: 'Tasks', type: 'memory' },
                // Key memories from conversations
                { id: 'git-chaos', label: 'Git Chaos 2026-05-01', type: 'event' },
                { id: 'comm-style', label: 'Communication Style', type: 'insight' },
                { id: 'start25', label: 'start25 Project', type: 'project' },
                { id: 'terse', label: 'Terse Messages', type: 'trait' },
                { id: 'push-gh', label: 'Always Push GH', type: 'rule' }
            ],
            links: [
                { source: 'brain', target: 'conversations' },
                { source: 'brain', target: 'user-context' },
                { source: 'brain', target: 'decisions' },
                { source: 'brain', target: 'tasks' },
                { source: 'conversations', target: 'git-chaos' },
                { source: 'conversations', target: 'comm-style' },
                { source: 'user-context', target: 'start25' },
                { source: 'user-context', target: 'terse' },
                { source: 'decisions', target: 'push-gh' }
            ]
        };

        const width = window.innerWidth;
        const height = window.innerHeight;

        const svg = d3.select('#graph')
            .append('svg')
            .attr('width', width)
            .attr('height', height);

        // Add zoom behavior
        const g = svg.append('g');
        
        svg.call(d3.zoom()
            .extent([[0, 0], [width, height]])
            .scaleExtent([0.1, 4])
            .on('zoom', ({transform}) => {
                g.attr('transform', transform);
            }));

        // Create force simulation
        const simulation = d3.forceSimulation(graphData.nodes)
            .force('link', d3.forceLink(graphData.links).id(d => d.id).distance(100))
            .force('charge', d3.forceManyBody().strength(-300))
            .force('center', d3.forceCenter(width / 2, height / 2))
            .force('collision', d3.forceCollide().radius(d => (d.r || 20) + 10));

        // Draw links
        const link = g.append('g')
            .selectAll('line')
            .data(graphData.links)
            .join('line')
            .attr('class', 'link');

        // Draw nodes
        const node = g.append('g')
            .selectAll('.node')
            .data(graphData.nodes)
            .join('g')
            .attr('class', 'node')
            .call(d3.drag()
                .on('start', dragstarted)
                .on('drag', dragged)
                .on('end', dragended))
            .on('click', clicked)
            .on('mouseover', showTooltip)
            .on('mouseout', hideTooltip);

        node.append('circle')
            .attr('r', d => d.r || 20)
            .attr('fill', d => {
                const colors = {
                    'root': '#6366f1',
                    'memory': '#8b5cf6',
                    'event': '#ec4899',
                    'insight': '#10b981',
                    'project': '#f59e0b',
                    'trait': '#06b6d4',
                    'rule': '#ef4444'
                };
                return colors[d.type] || '#6366f1';
            });

        node.append('text')
            .attr('dy', d => (d.r || 20) + 15)
            .text(d => d.label)
            .style('font-size', d => d.type === 'root' ? '14px' : '11px');

        // Update positions on tick
        simulation.on('tick', () => {
            link
                .attr('x1', d => d.source.x)
                .attr('y1', d => d.source.y)
                .attr('x2', d => d.target.x)
                .attr('y2', d => d.target.y);

            node.attr('transform', d => `translate(${d.x},${d.y})`);
        });

        // Drag functions
        function dragstarted(event, d) {
            if (!event.active) simulation.alphaTarget(0.3).restart();
            d.fx = d.x;
            d.fy = d.y;
        }

        function dragged(event, d) {
            d.fx = event.x;
            d.fy = event.y;
        }

        function dragended(event, d) {
            if (!event.active) simulation.alphaTarget(0);
            d.fx = null;
            d.fy = null;
        }

        // Click handler
        function clicked(event, d) {
            const panel = document.getElementById('panel');
            const title = document.getElementById('panel-title');
            const content = document.getElementById('panel-content');
            
            title.textContent = d.label;
            content.textContent = `Type: ${d.type}\nID: ${d.id}\n\nClick on connected nodes to explore relationships.`;
            panel.classList.add('active');
        }

        function closePanel() {
            document.getElementById('panel').classList.remove('active');
        }

        // Tooltip functions
        function showTooltip(event, d) {
            const tooltip = document.getElementById('tooltip');
            tooltip.style.opacity = '1';
            tooltip.style.left = event.pageX + 10 + 'px';
            tooltip.style.top = event.pageY + 10 + 'px';
            tooltip.textContent = `${d.label} (${d.type})`;
        }

        function hideTooltip() {
            document.getElementById('tooltip').style.opacity = '0';
        }

        // Load data function (would fetch actual files in real implementation)
        function loadData() {
            alert('In production, this would re-read all markdown files and rebuild the graph');
        }

        // Add pulsing animation for root node
        d3.select(node.nodes()[0])
            .select('circle')
            .transition()
            .duration(2000)
            .attr('r', 45)
            .transition()
            .duration(2000)
            .attr('r', 40)
            .on('end', function repeat() {
                d3.select(this)
                    .transition()
                    .duration(2000)
                    .attr('r', 45)
                    .transition()
                    .duration(2000)
                    .attr('r', 40)
                    .on('end', repeat);
            });

        // Auto-refresh every 30 seconds
        setInterval(() => {
            console.log('Auto-refresh: Would check for file updates here');
        }, 30000);
    </script>
</body>
</html>
